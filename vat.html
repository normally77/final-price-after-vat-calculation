<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณราคา (VAT & หัก ณ ที่จ่าย)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f4f7f6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus, select:focus {
            border-color: #007bff;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            margin-bottom: 15px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="checkbox"], input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .result-box {
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 20px;
            border-radius: 6px;
            margin-top: 25px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
            color: #444;
        }
        .result-row.total {
            border-top: 1px solid #ddd;
            padding-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        .highlight {
            color: #28a745;
            font-weight: bold;
        }
        .wht-highlight {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณราคา + VAT & หัก ณ ที่จ่าย</h2>
    
    <div class="form-group">
        <label for="inputPrice">จำนวนเงินที่ระบุ (บาท):</label>
        <input type="number" id="inputPrice" placeholder="ระบุจำนวนเงิน" min="0" oninput="calculatePrice()">
    </div>

    <div class="form-group">
        <label>เงื่อนไขภาษีมูลค่าเพิ่ม (VAT 7%):</label>
        <div class="radio-group">
            <label class="radio-item">
                <input type="radio" name="vatType" value="none" checked onchange="calculatePrice()"> ไม่คิด VAT
            </label>
            <label class="radio-item">
                <input type="radio" name="vatType" value="exclude" onchange="calculatePrice()"> ยังไม่รวม VAT (บวกเพิ่ม)
            </label>
            <label class="radio-item">
                <input type="radio" name="vatType" value="include" onchange="calculatePrice()"> รวม VAT แล้ว (ถอดในตัว)
            </label>
        </div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="includeWht" onchange="toggleWhtSelect()">
        <label style="margin:0;" for="includeWht">คิดภาษีหัก ณ ที่จ่าย</label>
    </div>

    <div class="form-group" id="whtRateGroup" style="display: none;">
        <label for="whtRate">อัตราภาษีหัก ณ ที่จ่าย (%):</label>
        <select id="whtRate" onchange="calculatePrice()">
            <option value="1">1% (ขนส่ง)</option>
            <option value="2">2% (โฆษณา)</option>
            <option value="3" selected>3% (รับจ้าง/บริการ/วิชาชีพอิสระ)</option>
            <option value="5">5% (ค่าเช่า)</option>
        </select>
    </div>

    <div class="result-box">
        <div class="result-row">
            <span>ราคาต้น (ก่อน VAT):</span>
            <span><span id="resBase">0.00</span> บาท</span>
        </div>
        <div class="result-row">
            <span>ภาษีมูลค่าเพิ่ม (VAT 7%):</span>
            <span class="highlight">+ <span id="resVat">0.00</span> บาท</span>
        </div>
        <div class="result-row">
            <span>ภาษีหัก ณ ที่จ่าย:</span>
            <span class="wht-highlight">- <span id="resWht">0.00</span> บาท</span>
        </div>
        <div class="result-row total">
            <span>ยอดสุทธิที่ต้องจ่ายจริง:</span>
            <span><span id="resTotal" class="highlight">0.00</span> บาท</span>
        </div>
    </div>
</div>

<script>
    function toggleWhtSelect() {
        const includeWht = document.getElementById('includeWht').checked;
        const whtRateGroup = document.getElementById('whtRateGroup');
        
        if (includeWht) {
            whtRateGroup.style.display = 'block';
        } else {
            whtRateGroup.style.display = 'none';
        }
        calculatePrice();
    }

    function calculatePrice() {
        // ดึงค่าจากหน้าเว็บ
        const inputPrice = parseFloat(document.getElementById('inputPrice').value) || 0;
        const vatType = document.querySelector('input[name="vatType"]:checked').value;
        const includeWht = document.getElementById('includeWht').checked;
        const whtRate = parseFloat(document.getElementById('whtRate').value) || 0;

        let basePrice = 0;
        let vatAmount = 0;
        let whtAmount = 0;

        // แยกเคสการคำนวณตามเงื่อนไข VAT เพื่อหา "ราคาต้นก่อน VAT"
        if (vatType === 'none') {
            basePrice = inputPrice;
            vatAmount = 0;
        } else if (vatType === 'exclude') {
            // เคสยังไม่รวม VAT: เงินที่กรอกคือราคาต้น แล้วคิด VAT เพิ่ม 7%
            basePrice = inputPrice;
            vatAmount = basePrice * 0.07;
        } else if (vatType === 'include') {
            // เคสรวม VAT แล้ว: ถอด VAT ออกมาเพื่อหาเงินต้นที่แท้จริง
            basePrice = inputPrice * 100 / 107;
            vatAmount = inputPrice - basePrice;
        }

        // คำนวณหัก ณ ที่จ่าย โดยคิดจาก "ราคาต้นก่อน VAT" เสมอตามหลักสรรพากร
        if (includeWht) {
            whtAmount = basePrice * (whtRate / 100);
        }

        // คำนวณยอดสุทธิสุดท้ายที่ต้องจ่ายจริง
        const totalAmount = basePrice + vatAmount - whtAmount;

        // อัปเดตตัวเลขแสดงผลบนหน้าจอ
        document.getElementById('resBase').innerText = formatNumber(basePrice);
        document.getElementById('resVat').innerText = formatNumber(vatAmount);
        document.getElementById('resWht').innerText = formatNumber(whtAmount);
        document.getElementById('resTotal').innerText = formatNumber(totalAmount);
    }

    function formatNumber(num) {
        return num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
</script>

</body>
</html>
